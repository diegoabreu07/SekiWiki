<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/cadastro-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Loxen - Login</title>
</head>

<body>
    <div class="header">
        <div class="container">
            <h1 class="titulo">SekiWiki</h1>
            <ul class="navbar">
                <li><a href="index.html">Home</a></li>
                <li class="atual"><a href="#">Login</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
            </ul>

        </div>
    </div>

    <div class="painel-login">
        <div class="login_usuario">
            <div class="info">
                <div class="formulario">
                    <h3>Entre</h3>
                    <input type="text" id="ipt_email" placeholder="Entre com seu email">

                    <div class="validacao-campo">
                        <input type="password" id="ipt_senha" placeholder="Insira a sua senha">
                        <i class="fa-solid fa-eye olho" onclick="mostrar()"></i>
                    </div>

                    <button onclick="entrar()">Entrar</button>
                </div>
            </div>


        </div>
    </div>
</body>

</html>
<script>
    let tentativas = 3
    function entrar() {
        let email = ipt_email.value
        let senha = ipt_senha.value

        let email_certo = `sptech.consulting@gmail.com`
        let senha_certa = `Urubu100@`

        while (tentativas > 0) {
            if (email == email_certo && senha == senha_certa) {
                window.location.href = "dashboard.html"
                break;
            } else {
                tentativas--
                alert(`Usuário ou senha inválidos! Tentativas restantes: ${tentativas}`)
                break;
            }

        }

        if (tentativas == 0) {
            alert('Muitas tentativas falhas de login! Redirecionando para a página inicial')
            window.location.href = "home.html"
        }

    }

    function mostrar() {
        if (ipt_senha.type === "password") {
            ipt_senha.type = "text";
        } else {
            ipt_senha.type = "password";
        }
    }
</script>
