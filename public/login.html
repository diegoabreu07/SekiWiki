<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/cadastro-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>SekiWiki - Login</title>
</head>

<body>
    <div class="header">
        <div class="container">
            <h1 class="titulo">SekiWiki</h1>
            <ul class="navbar">
                <li><a href="index.html">Home</a></li>
                <li class="atual"><a href="#">Login</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
            </ul>

        </div>
    </div>

    <div class="painel-login">
        <div class="login_usuario">
            <div class="info">
                <div class="formulario">
                    <h3>Entre</h3>
                    <input type="text" id="ipt_email" placeholder="Entre com seu email">

                    <div class="validacao-campo">
                        <input type="password" id="ipt_senha" placeholder="Insira a sua senha">
                        <i class="fa-solid fa-eye olho" onclick="mostrar()"></i>
                    </div>

                    <button onclick="entrar()">Entrar</button>
                </div>
            </div>


        </div>
    </div>
</body>

</html>
<script>
    function entrar() {
        let emailVar = ipt_email.value
        let senhaVar = ipt_senha.value

        if (emailVar == "" || senhaVar == "") {
            alert('Todos os campos devem ser preenchidos')
            return false;
        }
        else {
            setInterval(5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idUsuario;

                    setTimeout(function () {
                        alert('Login realizado! direcionando para tela inicial!')
                        window.location = "indexCadastrado.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function mostrar() {
        if (ipt_senha.type === "password") {
            ipt_senha.type = "text";
        } else {
            ipt_senha.type = "password";
        }
    }
</script>
